<script>
// ─── SERVICE WORKER REGISTRATION ────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').then(reg => {
      // Listen for SW asking for settings
      navigator.serviceWorker.addEventListener('message', e => {
        if (e.data && e.data.type === 'GET_WATER_SETTINGS') {
          const enabled = JSON.parse(localStorage.getItem('water_reminders_enabled') || 'false');
          const startHour = JSON.parse(localStorage.getItem('water_start_hour') || '8');
          const endHour = JSON.parse(localStorage.getItem('water_end_hour') || '22');
          const intervalHours = JSON.parse(localStorage.getItem('water_interval') || '2');
          e.source.postMessage({ type: 'WATER_SETTINGS', enabled, startHour, endHour, intervalHours });
        }
      });
    }).catch(()=>{});
  });
}
</script>

// ─── HELPERS ────────────────────────────────────────────────────────────────
function todayKey(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function load(key,fallback){try{const v=localStorage.getItem(key);return v!==null?JSON.parse(v):fallback;}catch{return fallback;}}
function save(key,value){try{localStorage.setItem(key,JSON.stringify(value));}catch{}}
function makeExKey(dk,did,bi,ei){return `${dk}_${did}_${bi}_${ei}`;}
function makeSnapKey(dk,did){return `snap_${dk}_${did}`;}
function findLastSession(dayId,completedDays){const today=todayKey();return Object.entries(completedDays).filter(([d,id])=>id===dayId&&d<today).map(([d])=>d).sort().reverse()[0]||null;}
function calcStreak(completedDays){const keys=Object.keys(completedDays).filter(k=>completedDays[k]).sort().reverse();if(!keys.length)return 0;let s=1;for(let i=0;i<keys.length-1;i++){const diff=Math.round((new Date(keys[i])-new Date(keys[i+1]))/86400000);if(diff<=4)s++;else break;}return s;}
function getMonthRange(){const n=new Date(),y=n.getFullYear(),m=n.getMonth();return{start:`${y}-${String(m+1).padStart(2,"0")}-01`,end:`${y}-${String(m+1).padStart(2,"0")}-${String(new Date(y,m+1,0).getDate()).padStart(2,"0")}`};}

// ─── NOTIFICATIONS ──────────────────────────────────────────────────────────
async function requestNotifications(){
  if(!('Notification' in window))return false;
  if(Notification.permission==='granted')return true;
  const result=await Notification.requestPermission();
  return result==='granted';
}

function scheduleWaterReminders(){
  if(!('serviceWorker' in navigator)||Notification.permission!=='granted')return;
  navigator.serviceWorker.ready.then(reg=>{
    // Store reminder schedule in localStorage — sw reads it
    save('water_reminders_enabled',true);
  });
}

// ─── CONFETTI ───────────────────────────────────────────────────────────────
function Confetti({active}){
  const [pieces]=useState(()=>Array.from({length:52},(_,i)=>({id:i,left:Math.random()*100,delay:Math.random()*1.8,duration:2.5+Math.random()*1.5,size:8+Math.random()*8,circle:Math.random()>0.5,color:["#C0406A","#9B59B6","#E67E22","#27AE60","#6B8CFF","#F0C040","#FFB8CC","#E74C3C"][i%8]})));
  if(!active)return null;
  return React.createElement('div',{style:{position:"fixed",top:0,left:0,width:"100%",height:"100%",pointerEvents:"none",zIndex:999,overflow:"hidden"}},
    pieces.map(p=>React.createElement('div',{key:p.id,style:{position:"absolute",top:0,left:`${p.left}%`,width:p.size,height:p.size,background:p.color,borderRadius:p.circle?"50%":"2px",animation:`conffall ${p.duration}s ${p.delay}s ease-in forwards`}}))
  );
}

// ─── REST TIMER ─────────────────────────────────────────────────────────────
function RestTimer({seconds,onDone,onSkip}){
  const [remaining,setRemaining]=useState(seconds);
  const ref=useRef();
  useEffect(()=>{ref.current=setInterval(()=>setRemaining(r=>{if(r<=1){clearInterval(ref.current);onDone();return 0;}return r-1;}),1000);return()=>clearInterval(ref.current);},[]);
  const pct=((seconds-remaining)/seconds)*100;
  return(
    <div style={{background:"#1A1A2E",borderRadius:16,padding:"14px 18px",margin:"8px 16px",color:"white"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <span style={{fontSize:12,fontWeight:700,opacity:0.65}}>⏱ Rest</span>
        <button onClick={onSkip} style={{background:"rgba(255,255,255,0.15)",border:"none",color:"white",borderRadius:8,padding:"3px 10px",fontSize:12,cursor:"pointer",fontWeight:600}}>Skip</button>
      </div>
      <div style={{fontSize:38,fontWeight:900,textAlign:"center",letterSpacing:"-1px",marginBottom:8}}>{Math.floor(remaining/60)}:{String(remaining%60).padStart(2,"0")}</div>
      <div style={{background:"rgba(255,255,255,0.15)",borderRadius:99,height:5}}>
        <div style={{height:5,borderRadius:99,background:"#C0406A",width:`${pct}%`,transition:"width 1s linear"}}/>
      </div>
    </div>
  );
}

// ─── EXERCISE ROW ───────────────────────────────────────────────────────────
function ExerciseRow({ex,exKey,lastWeight}){
  const totalSets=ex.sets;
  const [completedSets,setCompletedSets]=useState(()=>load(`sets_${exKey}`,0));
  const [weight,setWeight]=useState(()=>{const v=load(`weight_${exKey}`,"");if(v)return v;if(lastWeight){save(`weight_${exKey}`,lastWeight);return lastWeight;}return "";});
  const [resting,setResting]=useState(false);
  const isDone=completedSets>=totalSets;
  const handleSetDone=()=>{if(isDone||resting)return;const n=completedSets+1;setCompletedSets(n);save(`sets_${exKey}`,n);if(n<totalSets&&ex.restSec>0)setResting(true);};
  const handleReset=e=>{e.stopPropagation();setCompletedSets(0);save(`sets_${exKey}`,0);setResting(false);};
  const handleW=v=>{setWeight(v);save(`weight_${exKey}`,v);};
  return(
    <>
      <div style={{padding:"12px 16px",background:isDone?"rgba(39,174,96,0.07)":"transparent",transition:"background 0.3s"}}>
        <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,paddingTop:3,flexShrink:0}}>
            {Array.from({length:totalSets}).map((_,i)=><div key={i} style={{width:10,height:10,borderRadius:"50%",background:i<completedSets?"#27AE60":"#DDD",transition:"background 0.2s"}}/>)}
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:700,fontSize:14,color:isDone?"#888":"#1A1A2E",textDecoration:isDone?"line-through":"none",marginBottom:2}}>{ex.name}</div>
            <div style={{fontSize:12,color:isDone?"#CCC":"#666",marginBottom:ex.restSec>0?6:0}}>{ex.note}</div>
            {ex.restSec>0&&(
              <div style={{display:"flex",alignItems:"center",gap:6}} onClick={e=>e.stopPropagation()}>
                <input type="number" placeholder="kg" value={weight} onChange={e=>handleW(e.target.value)} style={{width:60,padding:"3px 8px",borderRadius:8,border:"1.5px solid #DDD",fontSize:13,fontWeight:600,color:"#333",outline:"none"}}/>
                <span style={{fontSize:12,color:"#AAA"}}>kg</span>
                {lastWeight&&!isDone&&<span style={{fontSize:11,color:"#9B59B6",fontWeight:600}}>last: {lastWeight}kg</span>}
                {weight&&lastWeight&&parseFloat(weight)>parseFloat(lastWeight)&&<span style={{fontSize:11,fontWeight:800,color:"#E67E22",background:"#FFF3E0",borderRadius:6,padding:"2px 6px"}}>🏆 PR!</span>}
              </div>
            )}
          </div>
          <div style={{flexShrink:0,textAlign:"right"}}>
            <div style={{background:"white",borderRadius:8,padding:"3px 8px",fontSize:12,fontWeight:700,color:isDone?"#CCC":"#555",marginBottom:4}}>{completedSets}/{totalSets} × {ex.reps}</div>
            {!isDone&&!resting&&<button onClick={handleSetDone} style={{background:"#C0406A",border:"none",color:"white",borderRadius:8,padding:"5px 10px",fontSize:12,fontWeight:700,cursor:"pointer",display:"block",marginLeft:"auto"}}>Set ✓</button>}
            {isDone&&<button onClick={handleReset} style={{background:"none",border:"1px solid #DDD",color:"#AAA",borderRadius:8,padding:"4px 8px",fontSize:11,cursor:"pointer",display:"block",marginLeft:"auto"}}>Reset</button>}
          </div>
        </div>
      </div>
      {resting&&<RestTimer seconds={ex.restSec} onDone={()=>setResting(false)} onSkip={()=>setResting(false)}/>}
    </>
  );
}

// ─── NOTIFICATION BANNER ────────────────────────────────────────────────────
function NotificationBanner(){
  const [show,setShow]=useState(false);
  const [enabled,setEnabled]=useState(false);
  const [startHour,setStartHour]=useState(()=>load('water_start_hour',8));
  const [endHour,setEndHour]=useState(()=>load('water_end_hour',22));
  const [interval,setIntervalH]=useState(()=>load('water_interval',2));

  useEffect(()=>{
    if(!('Notification' in window))return;
    if(Notification.permission==='default')setShow(true);
    if(Notification.permission==='granted'){setEnabled(true);setShow(false);}
  },[]);

  const handleEnable=async()=>{
    const granted=await requestNotifications();
    if(granted){
      setEnabled(true);setShow(false);
      save('water_reminders_enabled',true);
      save('water_start_hour',startHour);
      save('water_end_hour',endHour);
      save('water_interval',interval);
      // Tell SW to send confirmation + schedule reminders
      navigator.serviceWorker.ready.then(reg=>{
        reg.active.postMessage({type:'WATER_ENABLED',startHour,endHour,intervalHours:interval});
      });
    }
  };

  if(!show&&!enabled)return null;
  if(enabled)return(
    <div style={{background:"#E8F8FF",borderRadius:14,padding:"12px 16px",marginBottom:16,display:"flex",alignItems:"center",gap:10}}>
      <span style={{fontSize:20}}>💧</span>
      <div style={{flex:1}}>
        <div style={{fontSize:13,fontWeight:700,color:"#2980B9"}}>Water reminders on</div>
        <div style={{fontSize:11,color:"#888"}}>Every {interval}h from {startHour}:00 to {endHour}:00</div>
      </div>
      <button onClick={()=>{save('water_reminders_enabled',false);setEnabled(false);setShow(true);}} style={{background:"none",border:"1px solid #DDD",borderRadius:8,padding:"4px 8px",fontSize:11,color:"#AAA",cursor:"pointer"}}>Turn off</button>
    </div>
  );
  return(
    <div style={{background:"#E8F8FF",borderRadius:14,padding:"14px 16px",marginBottom:16}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
        <span style={{fontSize:20}}>💧</span>
        <div style={{fontWeight:700,fontSize:14,color:"#2980B9"}}>Water reminders</div>
      </div>
      <p style={{margin:"0 0 10px",fontSize:13,color:"#555"}}>Get a notification every {interval} hours to drink water.</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
        <div>
          <label style={{fontSize:11,fontWeight:700,color:"#888",display:"block",marginBottom:4}}>From</label>
          <select value={startHour} onChange={e=>setStartHour(Number(e.target.value))} style={{width:"100%",padding:"6px",borderRadius:8,border:"1.5px solid #DDD",fontSize:13,outline:"none"}}>
            {Array.from({length:24},(_,i)=>i).map(h=><option key={h} value={h}>{String(h).padStart(2,"0")}:00</option>)}
          </select>
        </div>
        <div>
          <label style={{fontSize:11,fontWeight:700,color:"#888",display:"block",marginBottom:4}}>Until</label>
          <select value={endHour} onChange={e=>setEndHour(Number(e.target.value))} style={{width:"100%",padding:"6px",borderRadius:8,border:"1.5px solid #DDD",fontSize:13,outline:"none"}}>
            {Array.from({length:24},(_,i)=>i).map(h=><option key={h} value={h}>{String(h).padStart(2,"0")}:00</option>)}
          </select>
        </div>
        <div>
          <label style={{fontSize:11,fontWeight:700,color:"#888",display:"block",marginBottom:4}}>Every</label>
          <select value={interval} onChange={e=>setIntervalH(Number(e.target.value))} style={{width:"100%",padding:"6px",borderRadius:8,border:"1.5px solid #DDD",fontSize:13,outline:"none"}}>
            {[1,1.5,2,3].map(h=><option key={h} value={h}>{h}h</option>)}
          </select>
        </div>
      </div>
      <button onClick={handleEnable} style={{width:"100%",padding:"10px",borderRadius:10,border:"none",background:"#2980B9",color:"white",fontWeight:700,fontSize:14,cursor:"pointer"}}>
        Turn on water reminders 💧
      </button>
    </div>
  );
}

              {hw&&<><span style={{fontSize:9,fontWeight:900,color:"white",lineHeight:1}}>{d.workout}</span><span style={{fontSize:8,color:"rgba(255,255,255,0.8)",lineHeight:1}}>{d.date}</span></>}

// ─── STATS ──────────────────────────────────────────────────────────────────

  const {start,end}=getMonthRange();

  const monthRuns=runs.filter(r=>r.date>=start&&r.date<=end);
  const totalKm=monthRuns.reduce((s,r)=>s+(parseFloat(r.distance)||0),0);
  const totalRunMin=monthRuns.reduce((s,r)=>s+(parseFloat(r.duration)||0),0);
  const allTimeKm=runs.reduce((s,r)=>s+(parseFloat(r.distance)||0),0);
  const totalWorkouts=Object.values(completedDays).filter(v=>v).length;
  const totalRuns=runs.length;
  const perDay={A:0,B:0,C:0,D:0};

    <div>

      <p style={{margin:"0 0 16px",fontSize:12,color:"#AAA"}}>All time + {monthName}</p>
      <div style={{background:streak>0?"linear-gradient(135deg,#E67E22,#C0406A)":"#F0F0F0",borderRadius:16,padding:"20px",marginBottom:16,display:"flex",alignItems:"center",gap:16,color:streak>0?"white":"#AAA"}}>
        <span style={{fontSize:40}}>🔥</span>
        <div><div style={{fontSize:36,fontWeight:900,lineHeight:1}}>{streak}</div><div style={{fontSize:14,fontWeight:600,opacity:0.85}}>session streak</div><div style={{fontSize:12,opacity:0.7,marginTop:2}}>Up to 3 rest days between sessions is fine</div></div>
      </div>
      <p style={{margin:"0 0 10px",fontSize:12,fontWeight:700,color:"#AAA",textTransform:"uppercase",letterSpacing:0.5}}>All time</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:12}}>
        <SC emoji="💪" value={totalWorkouts} label="Workouts" color="#C0406A"/>
        <SC emoji="🏃‍♀️" value={totalRuns} label="Runs" color="#3498DB"/>

      <p style={{margin:"0 0 10px",fontSize:12,fontWeight:700,color:"#AAA",textTransform:"uppercase",letterSpacing:0.5}}>{monthName}</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
        <SC emoji="🏋️‍♀️" value={monthWorkouts.length} label="Workouts this month" color="#C0406A"/>
        <SC emoji="🏃‍♀️" value={monthRuns.length} label="Runs this month" color="#3498DB"/>

// ─── MAIN APP ───────────────────────────────────────────────────────────────
function App(){
  const [activeDay,setActiveDay]=useState(0);
  const [scheduleMode,setScheduleMode]=useState("4day");
  const [expanded,setExpanded]=useState({});
  const [tab,setTab]=useState("workout");
  const [completedDays,setCompletedDays]=useState(()=>load("completed_days",{}));
  const [runs,setRuns]=useState(()=>load("runs",[]));
  const [showConfetti,setShowConfetti]=useState(false);
  const [,forceUpdate]=useState(0);

  const day=plan.days[activeDay];
  const dateKey=todayKey();
  const schedule=scheduleMode==="4day"?plan.weeklyTemplate:plan.altWeekly;
  const streak=calcStreak(completedDays);

  const totalSets=day.blocks.reduce((s,b)=>s+b.exercises.reduce((ss,e)=>ss+e.sets,0),0);
  const doneSets=day.blocks.reduce((s,b,bi)=>s+b.exercises.reduce((ss,ex,ei)=>ss+Math.min(load(`sets_${makeExKey(dateKey,day.id,bi,ei)}`,0),ex.sets),0),0);
  const allDone=totalSets>0&&doneSets>=totalSets;
  const pct=totalSets?(doneSets/totalSets)*100:0;

  const markedRef=useRef({});
  useEffect(()=>{
    const key=`${dateKey}_${day.id}`;
    if(allDone&&!markedRef.current[key]){
      markedRef.current[key]=true;setShowConfetti(true);setTimeout(()=>setShowConfetti(false),4200);
      const snap={};day.blocks.forEach((b,bi)=>b.exercises.forEach((ex,ei)=>{const w=load(`weight_${makeExKey(dateKey,day.id,bi,ei)}`,"");if(w)snap[`${bi}_${ei}`]=w;}));
      save(makeSnapKey(dateKey,day.id),snap);
      const updated={...completedDays,[dateKey]:day.id};setCompletedDays(updated);save("completed_days",updated);
    }
  },[allDone]);

  useEffect(()=>{const id=setInterval(()=>forceUpdate(n=>n+1),1000);return()=>clearInterval(id);},[activeDay]);

  const toggleBlock=key=>setExpanded(e=>({...e,[key]:!e[key]}));

  const tabs=[
    {id:"workout",label:"Workout",emoji:"💪"},
    {id:"run",label:"Run",emoji:"🏃‍♀️"},
    {id:"history",label:"History",emoji:"📅"},
    {id:"stats",label:"Stats",emoji:"📊"},
    {id:"letter",label:"Letter",emoji:"🖤"},
  ];

  return(
    <div style={{fontFamily:"'Inter',system-ui,sans-serif",background:"#F8F7FF",minHeight:"100vh",paddingBottom:90}}>
      <Confetti active={showConfetti}/>
      <div style={{background:"linear-gradient(135deg,#C0406A 0%,#9B59B6 100%)",padding:"28px 20px 20px",textAlign:"center",color:"white"}}>
        <h1 style={{margin:0,fontSize:24,fontWeight:900,letterSpacing:"-0.5px"}}>Demi's Workout Plan</h1>
        <p style={{margin:"4px 0 16px",fontSize:13,opacity:0.85}}>av ju Demik</p>
        <div style={{display:"flex",justifyContent:"center",gap:8}}>
          <span style={{background:"rgba(255,255,255,0.2)",borderRadius:20,padding:"4px 12px",fontSize:12,fontWeight:600}}>3–4x / week</span>
          <span style={{background:"rgba(255,255,255,0.2)",borderRadius:20,padding:"4px 12px",fontSize:12,fontWeight:600}}>~90 min</span>
        </div>
      </div>

      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"white",borderTop:"1px solid #EEE",display:"flex",zIndex:100,boxShadow:"0 -4px 20px rgba(0,0,0,0.07)"}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"10px 0 8px",border:"none",background:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            <span style={{fontSize:18}}>{t.emoji}</span>
            <span style={{fontSize:9,fontWeight:700,color:tab===t.id?"#C0406A":"#BBB"}}>{t.label}</span>
            {tab===t.id&&<div style={{width:4,height:4,borderRadius:"50%",background:"#C0406A"}}/>}
          </button>
        ))}
      </div>

      <div style={{maxWidth:640,margin:"0 auto",padding:"20px 16px 0"}}>

        {tab==="workout"&&(
          <>
            <NotificationBanner/>
            <div style={{display:"flex",gap:12,marginBottom:20}}>
              <div style={{background:streak>0?"linear-gradient(135deg,#E67E22,#C0406A)":"#F0F0F0",borderRadius:14,padding:"12px 18px",display:"flex",alignItems:"center",gap:10,color:streak>0?"white":"#AAA"}}>
                <span style={{fontSize:26}}>🔥</span>
                <div><div style={{fontWeight:900,fontSize:22,lineHeight:1}}>{streak}</div><div style={{fontSize:10,fontWeight:600,opacity:0.85}}>sessions</div></div>
              </div>
              <div style={{flex:1,background:"white",borderRadius:14,padding:"12px 16px",boxShadow:"0 1px 10px rgba(0,0,0,0.05)"}}>
                <div style={{fontSize:11,fontWeight:700,color:"#888",marginBottom:4}}>Today's sets</div>
                <div style={{fontSize:22,fontWeight:900,color:"#1A1A2E"}}>{doneSets}<span style={{fontSize:13,color:"#AAA",fontWeight:600}}>/{totalSets}</span></div>
                <div style={{background:"#F0F0F0",borderRadius:99,height:6,marginTop:6}}><div style={{height:6,borderRadius:99,background:"linear-gradient(90deg,#C0406A,#9B59B6)",width:`${pct}%`,transition:"width 0.3s"}}/></div>
              </div>
            </div>

            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
              <span style={{fontWeight:800,fontSize:14,color:"#1A1A2E"}}>Weekly Schedule</span>
              <div style={{display:"flex",gap:6}}>
                {["4day","3day"].map(m=><button key={m} onClick={()=>setScheduleMode(m)} style={{padding:"4px 10px",borderRadius:12,border:"none",cursor:"pointer",fontSize:12,fontWeight:700,background:scheduleMode===m?"#C0406A":"#EEE",color:scheduleMode===m?"white":"#666"}}>{m==="4day"?"4 days":"3 days"}</button>)}
              </div>
            </div>

            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:6,marginBottom:20}}>
              {schedule.map((s,i)=>{const d=plan.days.find(d=>d.id===s.session);const isActive=d&&plan.days.indexOf(d)===activeDay;return(
                <div key={i} onClick={()=>d&&setActiveDay(plan.days.indexOf(d))} style={{background:s.session==="REST"?"#EDEDF5":d?.color,borderRadius:12,padding:"10px 4px",textAlign:"center",cursor:d?"pointer":"default",border:isActive?`2px solid ${d.accent}`:"2px solid transparent"}}>
                  <div style={{fontSize:10,fontWeight:700,color:"#888",marginBottom:2}}>{s.day}</div>
                  <div style={{fontSize:16}}>{s.emoji}</div>
                  <div style={{fontSize:9,fontWeight:700,color:s.session==="REST"?"#AAA":"#333",marginTop:2}}>{s.session==="REST"?"Rest":`Day ${s.session}`}</div>
                </div>
              );})}
            </div>

            <div style={{display:"flex",gap:8,marginBottom:16,overflowX:"auto",paddingBottom:4}}>
              {plan.days.map((d,i)=><button key={i} onClick={()=>setActiveDay(i)} style={{flexShrink:0,padding:"8px 16px",borderRadius:20,border:"none",cursor:"pointer",fontWeight:700,fontSize:13,background:i===activeDay?d.accent:d.color,color:i===activeDay?"white":"#333"}}>{d.emoji} {d.label}</button>)}
            </div>

            <div style={{background:"white",borderRadius:20,overflow:"hidden",boxShadow:"0 2px 20px rgba(0,0,0,0.08)",marginBottom:24}}>
              <div style={{background:day.accent,padding:"20px 20px 16px",color:"white"}}>
                <div style={{fontSize:28,marginBottom:4}}>{day.emoji}</div>
                <h2 style={{margin:"0 0 12px",fontSize:18,fontWeight:800}}>{day.label}: {day.focus}</h2>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{flex:1,background:"rgba(255,255,255,0.25)",borderRadius:99,height:6}}><div style={{height:6,borderRadius:99,background:"white",width:`${pct}%`,transition:"width 0.3s"}}/></div>
                  <span style={{fontSize:12,fontWeight:700,opacity:0.9,flexShrink:0}}>{doneSets}/{totalSets} sets</span>
                </div>
                {allDone&&<div style={{marginTop:10,background:"rgba(255,255,255,0.2)",borderRadius:10,padding:"6px 12px",fontSize:13,fontWeight:700,textAlign:"center"}}>Workout done! 🖤</div>}
              </div>
              <div style={{padding:"14px 20px",background:"#FFFBF0",borderBottom:"1px solid #F0EAD0"}}>
                <div style={{fontSize:11,fontWeight:700,color:"#C89A00",textTransform:"uppercase",letterSpacing:0.5,marginBottom:4}}>🌅 Warm-Up (5 min)</div>
                <p style={{margin:0,fontSize:13,color:"#555",lineHeight:1.5}}>{day.warmup}</p>
              </div>
              {day.blocks.map((block,bi)=>{
                const s=typeColors[block.type],key=`${activeDay}-${bi}`,isOpen=expanded[key]!==false;
                return(
                  <div key={bi} style={{margin:"0 16px 12px",marginTop:bi===0?16:0}}>
                    <button onClick={()=>toggleBlock(key)} style={{width:"100%",textAlign:"left",background:s.bg,border:`1.5px solid ${s.border}`,borderRadius:14,padding:"12px 16px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <span style={{fontWeight:700,fontSize:14,color:"#1A1A2E"}}>{block.name}</span>
                      <span style={{fontSize:12,color:"#888"}}>{isOpen?"▲":"▼"}</span>
                    </button>
                    {isOpen&&(
                      <div style={{background:s.bg,border:`1.5px solid ${s.border}`,borderTop:"none",borderRadius:"0 0 14px 14px",overflow:"hidden"}}>
                        {block.exercises.map((ex,ei)=>{
                          const exKey=makeExKey(dateKey,day.id,bi,ei);
                          const lastDate=findLastSession(day.id,completedDays);
                          const lastSnap=lastDate?load(makeSnapKey(lastDate,day.id),null):null;
                          const lastWeight=lastSnap?lastSnap[`${bi}_${ei}`]:null;
                          return(
                            <div key={`${day.id}-${bi}-${ei}`} style={{borderTop:ei>0?`1px solid ${s.border}40`:"none"}}>
                              <ExerciseRow key={`${day.id}-${dateKey}-${bi}-${ei}`} ex={ex} exKey={exKey} lastWeight={lastWeight}/>
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                );
              })}
              <div style={{padding:"14px 20px",background:"#F0FBF5",borderTop:"1px solid #D0EED8"}}>
                <div style={{fontSize:11,fontWeight:700,color:"#27AE60",textTransform:"uppercase",letterSpacing:0.5,marginBottom:4}}>🧘‍♀️ Cool-Down (5 min)</div>
                <p style={{margin:0,fontSize:13,color:"#555",lineHeight:1.5}}>{day.cooldown}</p>
              </div>
              <div style={{padding:"12px 20px 20px",textAlign:"center"}}>
                <span style={{background:"#F0F4FF",borderRadius:12,padding:"6px 16px",fontSize:13,fontWeight:700,color:"#6B8CFF"}}>⏱ Total: ~85–95 minutes</span>
              </div>
            </div>
          </>
        )}

        {tab==="run"&&<RunLog runs={runs} setRuns={setRuns}/>}

        {tab==="history"&&(
          <>
            <div style={{display:"flex",gap:12,marginBottom:20}}>
              <div style={{background:streak>0?"linear-gradient(135deg,#E67E22,#C0406A)":"#F0F0F0",borderRadius:14,padding:"12px 18px",display:"flex",alignItems:"center",gap:10,color:streak>0?"white":"#AAA"}}>
                <span style={{fontSize:26}}>🔥</span>
                <div><div style={{fontWeight:900,fontSize:22,lineHeight:1}}>{streak}</div><div style={{fontSize:10,fontWeight:600,opacity:0.85}}>streak</div></div>
              </div>
              <div style={{flex:1,background:"white",borderRadius:14,padding:"12px 16px",boxShadow:"0 1px 10px rgba(0,0,0,0.05)"}}>
                <div style={{fontSize:12,fontWeight:700,color:"#888",marginBottom:4}}>Total activity</div>
                <div style={{fontSize:28,fontWeight:900,color:"#1A1A2E"}}>{Object.values(completedDays).filter(v=>v).length+runs.length}</div>
                <div style={{fontSize:11,color:"#AAA"}}>workouts + runs</div>
              </div>
            </div>
            <HistoryCalendar completedDays={completedDays} runs={runs}/>
            <p style={{textAlign:"center",fontSize:12,color:"#BBB"}}>Up to 3 rest days between sessions won't break your streak 🤍</p>
          </>
        )}

        {tab==="stats"&&<StatsTab completedDays={completedDays} runs={runs} streak={streak}/>}

        {tab==="letter"&&(
          <>
            <div style={{background:"#FFF0F4",borderRadius:20,padding:"28px 24px",border:"1.5px solid #FFB8CC",marginBottom:20}}>
              <p style={{margin:"0 0 14px",fontSize:15,color:"#222",lineHeight:1.8,fontWeight:600}}>Demik,</p>
              <p style={{margin:"0 0 14px",fontSize:14,color:"#444",lineHeight:1.8}}>I put this plan together because I know this is something that's important to you, and I wanted to make it as simple as possible to follow.</p>
              <p style={{margin:"0 0 14px",fontSize:14,color:"#444",lineHeight:1.8}}>Your knee has been taken into account, the workouts fit around a normal schedule, and if you miss a few days, it's not a big deal. Just pick up where you left off and keep going.</p>
              <p style={{margin:"0 0 14px",fontSize:14,color:"#444",lineHeight:1.8}}>I've seen the effort you're already putting into taking care of yourself, and that's what matters most. You're already doing a lot of things right. This plan is just a tool to help you keep moving toward a goal that's important to you.</p>
              <p style={{margin:"0 0 20px",fontSize:14,color:"#444",lineHeight:1.8}}>And for what it's worth, I'm always going to be in your corner. I want to see you succeed because I care about you, and because I know you're capable of a lot more than you give yourself credit for.</p>
              <p style={{margin:0,fontSize:15,color:"#C0406A",fontWeight:700}}>av ju 🖤</p>
            </div>
            <FunnyButton/>
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
